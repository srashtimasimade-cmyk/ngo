{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Member - NGO Better Tomorrow{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col-md-8">
            <a href="{% url 'ngo_app:member-list' %}" class="btn btn-outline-secondary btn-sm mb-3">
                <i class="bi bi-arrow-left"></i> Back to Members
            </a>
            <h1><i class="bi bi-person-plus"></i> {% if form.instance.pk %}Edit{% else %}Add{% endif %} Team Member</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-6 offset-lg-3">
            <div class="card">
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success btn-lg w-100">
                                <i class="bi bi-check-circle"></i> {% if form.instance.pk %}Update{% else %}Add{% endif %} Member
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
